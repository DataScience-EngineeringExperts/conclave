name: Gitleaks

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  gitleaks:
    name: "gitleaks"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
